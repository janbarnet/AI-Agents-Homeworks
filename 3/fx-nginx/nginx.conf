events {}

http {
  resolver 1.1.1.1 ipv6=off;

  server {
    listen 80;

    location /mcp {
      proxy_pass https://currency-mcp.wesbos.com/mcp;

      proxy_http_version 1.1;
      proxy_set_header Host currency-mcp.wesbos.com;
      proxy_set_header Connection "";

      proxy_ssl_server_name on;
      proxy_ssl_name currency-mcp.wesbos.com;

      proxy_ssl_protocols TLSv1.2 TLSv1.3;

      proxy_buffering off;
    }
  }
}